name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12.7", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Install test requirements
        run: uv pip install pytest pytest-cov

      - name: Check import boundaries
        run: uv run python scripts/check-import-boundary.py

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-branch --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  convergence-audit:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: uv sync --dev

      - name: P0 convergence audit
        run: uv run pytest -m p0 --tb=short

  ch-integration:
    needs: [test]
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        ports:
          - 8123/tcp
          - 9000/tcp
        options: >-
          --health-cmd "clickhouse-client --password clickhouse --query 'SELECT 1'"
          --health-interval 5s --health-timeout 5s --health-retries 5
          --env CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=0
          --env CLICKHOUSE_PASSWORD=clickhouse
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: uv sync --dev

      - name: Install CH test dependencies
        run: uv pip install testcontainers clickhouse-connect

      - name: ClickHouse integration convergence test
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: ${{ job.services.clickhouse.ports[8123] }}
          CLICKHOUSE_USERNAME: default
          CLICKHOUSE_PASSWORD: clickhouse
        run: >-
          uv run pytest
          tests/integration/test_ch_convergence.py
          tests/integration/test_ch_multi_version_audit.py
          -m integration --ch-integration --tb=short -v

  pg-integration:
    needs: [test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13-alpine
        ports:
          - 5432/tcp
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dbwarden_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: uv sync --dev

      - name: Install PG test dependencies
        run: uv pip install psycopg2-binary sqlalchemy testcontainers

      - name: PostgreSQL integration convergence test
        env:
          PG_HOST: localhost
          PG_PORT: ${{ job.services.postgres.ports[5432] }}
          PG_USER: postgres
          PG_PASSWORD: postgres
          PG_DATABASE: dbwarden_test
        run: >-
          uv run pytest
          tests/integration/test_pg_convergence.py
          -m integration --pg-integration --tb=short -v
