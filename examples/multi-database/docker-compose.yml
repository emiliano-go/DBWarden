services:
  # PostgreSQL: transactional database backend.
  # The dbwarden migration system connects to this to apply
  # schema changes and store migration tracking data.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: primary
    ports:
      - "5432:5432"

  # ClickHouse: analytics database backend.
  # Uses the MergeTree engine family configured via CHTableMeta.
  # Port 8123 is the HTTP interface; port 9000 is the native TCP.
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
