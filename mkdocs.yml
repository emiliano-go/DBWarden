site_name: DBWarden Documentation
site_description: Database migration system for Python/SQLAlchemy projects
site_author: Emiliano Gandini Outeda
repo_url: https://github.com/emiliano-gandini-outeda/dbwarden
edit_uri: edit/main/docs

theme:
  name: material
  favicon: assets/icon.png
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - Introduction: getting-started/introduction.md
      - Installation: installation.md
      - First Steps: getting-started/first-steps.md
  - Tutorial - User Guide:
      - Configuration: configuration.md
      - Your First Migration: tutorial/your-first-migration.md
      - Applying Migrations: tutorial/applying-migrations.md
      - Rolling Back: tutorial/rolling-back.md
      - Checking Status: tutorial/checking-status.md
      - Dev Mode: tutorial/dev-mode.md
      - Multi-Database Setup: tutorial/multi-database-setup.md
  - FastAPI Integration:
      - Overview: fastapi/overview.md
      - get_session: fastapi/get-session.md
      - migration_context: fastapi/migration-context.md
      - DBWardenHealthRouter: fastapi/health-router.md
      - Full Example: fastapi/full-example.md
  - Advanced User Guide:
      - Migration File Format: migration-files.md
      - SQL Translation: sql-translation.md
      - Migration Locking: advanced/migration-locking.md
      - Checksum Integrity: advanced/checksum-integrity.md
      - Squashing Migrations: advanced/squashing-migrations.md
      - CI/CD Patterns: advanced/ci-cd-patterns.md
      - Safe Deployment: advanced/safe-deployment.md
  - Reference:
      - CLI Reference:
          - Overview: cli-reference.md
          - init: commands/init.md
          - settings/database: commands/database.md
          - make-migrations: commands/make-migrations.md
          - new: commands/new.md
          - migrate: commands/migrate.md
          - rollback: commands/rollback.md
          - history: commands/history.md
          - status: commands/status.md
          - check-db: commands/check-db.md
          - diff: commands/diff.md
          - squash: commands/squash.md
          - lock/unlock: commands/lock.md
          - version: commands/version.md
      - Supported Databases: databases.md
      - Configuration API: reference/configuration-api.md
      - Architecture: architecture-deep-dive.md
      - SQLAlchemy Models: models.md
      - Migrate from TOML: reference/migrate-from-toml.md

markdown_extensions:
  - admonition
  - codehilite
  - tables
  - toc:
      permalink: true
