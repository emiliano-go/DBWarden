[project]
site_name = "DBWarden Documentation"
site_description = "SQL-first database migration system for Python and SQLAlchemy projects"
site_url = "https://emiliano-gandini-outeda.github.io/DBWarden/"
docs_dir = "docs"
site_dir = "site"

copyright = "&copy; 2026 Emiliano Gandini Outeda"

extra_css = ["stylesheets/extra.css"]

[project.theme]
variant = "modern"

font.text = "Ubuntu"
font.code = "JetBrains Mono"

features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.top",
    "navigation.footer",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/emiliano-gandini-outeda/DBWarden"
name = "DBWarden on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/dbwarden/"
name = "DBWarden on PyPI"

