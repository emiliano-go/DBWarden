[project]
site_name = "DBWarden Documentation"
site_description = "SQL-first database migration system for Python and SQLAlchemy projects"
site_url = "https://emiliano-gandini-outeda.github.io/DBWarden/"
docs_dir = "docs"
site_dir = "site"

copyright = "&copy; 2026 Emiliano Gandini Outeda"

extra_css = ["stylesheets/extra.css"]

[project.theme]
variant = "modern"

font.text = "Ubuntu"
font.code = "JetBrains Mono"

features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.top",
    "navigation.footer",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/emiliano-gandini-outeda/DBWarden"
name = "DBWarden on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/dbwarden/"
name = "DBWarden on PyPI"

[[project.nav]]
"Home" = "index.md"

[[project.nav]]
"Getting Started" = "getting-started/introduction.md"

[[project.nav]]
"Configuration" = "configuration/index.md"

[[project.nav]]
"User Guide" = "tutorial/your-first-migration.md"

[[project.nav]]
"FastAPI Integration" = "fastapi/index.md"

[[project.nav]]
"Advanced User Guide" = "migration-files.md"

[[project.nav]]
"Reference" = "cli-reference.md"

[[project.nav]]
"Installation" = "installation.md"

[[project.nav]]
"Supported Databases" = "databases.md"

[[project.nav]]
"SQLAlchemy Models" = "models.md"

[[project.nav]]
"Architecture" = "architecture-deep-dive.md"

[project.markdown_extensions.tables]

[project.markdown_extensions.admonition]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]
